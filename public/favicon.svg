<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background: dark rounded square -->
  <rect width="64" height="64" rx="14" fill="#0a0a0a"/>

  <!-- Gold gradient definition -->
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5d800"/>
      <stop offset="100%" stop-color="#c8a200"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3fd4"/>
      <stop offset="100%" stop-color="#0a1f7a"/>
    </linearGradient>
  </defs>

  <!-- Blue accent slash — the "kinetic" motion element -->
  <rect x="28" y="10" width="5" height="44" rx="2.5" fill="url(#accentGrad)" opacity="0.7" transform="rotate(-12 30 32)"/>

  <!-- K letterform — left vertical stroke -->
  <rect x="13" y="13" width="7" height="38" rx="3.5" fill="url(#goldGrad)"/>

  <!-- K upper-right diagonal arm -->
  <polygon points="18,32 42,13 47,13 24,32" fill="url(#goldGrad)" rx="2"/>

  <!-- K lower-right diagonal arm -->
  <polygon points="18,32 42,51 47,51 24,32" fill="url(#goldGrad)"/>

  <!-- Small gold dot — premium accent -->
  <circle cx="49" cy="14" r="4" fill="#f5d800" opacity="0.9"/>
</svg>
